<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novecento PWA</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    p {
      margin-bottom: 30px;
      color: #555;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .links a {
      display: block;
      text-decoration: none;
      background: #222;
      color: white;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 1.1rem;
      transition: background 0.2s ease;
    }

    .links a:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Novecento PWA</h1>
    <p>Scegli l’autore da aprire.</p>

    <div class="links">
      <a href="Letteratura/Pirandello/index.html">Pirandello</a>
      <a href="Letteratura/Svevo/index.html">Svevo</a>
    </div>
  </div>
</body>
</html>
